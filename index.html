<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udon Thani Provincial Education Office PDF Helper</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        /* CSS Variables และ Dark Mode */
        :root { 
            --primary: #0056b3; --success: #28a745; --danger: #dc3545; 
            --bg: #f0f2f5; --card-bg: #ffffff; --text: #333333; --border: #dddddd;
            --critical: #8b0000; --warning: #ffc107;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a; --card-bg: #2d2d2d; --text: #f0f0f0; --border: #444444;
            --primary: #3793ff;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        
        .system-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
        .system-logo { height: 40px; width: auto; object-fit: contain; }
        .system-title { font-size: 18px; font-weight: bold; color: var(--primary); margin: 0; }
        
        .toolbar { 
            background: var(--card-bg); padding: 12px 15px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
            margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; position: sticky; top: 15px; z-index: 100;
            border: 1px solid var(--border);
        }

        .btn { padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 4px; height: 32px; white-space: nowrap; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        
        .btn-critical { background: var(--critical) !important; color: #ffffff !important; border: 2px solid #ff4500 !important; font-weight: 800 !important; grid-column: span 2; margin-top: 5px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .history-group { display: flex; gap: 4px; background: var(--border); padding: 4px; border-radius: 6px; }

        label { font-size:10px; font-weight:bold; margin-bottom: 3px; display: block; color: var(--text); text-transform: uppercase; }
        .input-group { display:flex; flex-direction:column; flex: 1 1 auto; min-width: 100px; }
        input[type="number"], select { padding:4px 8px; border-radius:6px; border:1px solid var(--border); height: 32px; box-sizing: border-box; width: 100%; font-size: 13px; background: var(--card-bg); color: var(--text); }

        .system-credit { font-size: 10px; color: #777; width: 100%; text-align: right; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-weight: 500; }

        #pdf-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .page-card { background: var(--card-bg); padding: 8px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); position: relative; display: flex; flex-direction: column; cursor: grab; border: 2px solid var(--border); }
        .page-card:hover { border-color: var(--primary); }
        .canvas-wrapper { width: 100%; aspect-ratio: 1 / 1.4; background: #f8f9fa; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 4px; position: relative; }
        .page-card canvas { max-width: 100%; max-height: 100%; transition: transform 0.3s; }
        
        .number-preview { 
            position: absolute; 
            color: #000000 !important; 
            background: rgba(255, 255, 255, 0.9) !important; 
            border: 1px dashed #000000 !important; 
            padding: 2px 4px; 
            font-size: 11px; 
            pointer-events: none; 
            display: none; 
            z-index: 20; 
            white-space: nowrap; 
        }

        #zoom-number-preview {
            background: transparent !important;
            border: 1px dashed rgba(0, 0, 0, 0.5) !important; 
            padding: 0;
        }

        .page-info { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; z-index: 10; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 8px; }
        .controls button { padding: 4px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); border-radius: 4px; }
        .toggle-print-label { grid-column: span 2; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 4px; cursor: pointer; padding: 4px; border-radius: 4px; font-weight: bold; background: #e3f2fd; color: #0056b3; border: 1px solid #b6d4fe; }
        .toggle-print-label.disabled { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }

        #zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        #zoom-content { background: var(--card-bg); padding: 10px; border-radius: 8px; position: relative; max-width: 95vw; max-height: 95vh; display: flex; flex-direction: column; border: 1px solid var(--border); overflow: hidden; }
        .close-modal { position: absolute; top: -15px; right: -15px; background: #dc3545; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-weight: bold; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 100; }
        #zoom-canvas { max-width: 100%; max-height: calc(95vh - 20px); object-fit: contain; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); align-items: center; justify-content: center; z-index: 2000; flex-direction: column; }

        .theme-switch {
            position: fixed; top: 15px; right: 15px; z-index: 9999;
            background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-weight: bold; font-size: 11px;
        }
    </style>
</head>
<body>

<button class="theme-switch" onclick="toggleTheme()" id="theme-btn">🌙 Dark Mode</button>

<div id="loading">
    <div style="font-size: 24px; margin-bottom: 10px; color: #0056b3; font-weight: bold;">⏳ น้องยูดีกำลังจัดการให้ค่ะ...</div>
    <div id="loading-status">โปรดรอสักครู่</div>
</div>

<header class="system-header">
    <img src="img/logo.png" alt="PEO Udon Logo" class="system-logo">
    <h1 class="system-title">Udon Thani Provincial Education Office PDF Helper</h1>
</header>

<div id="main-content">
    <div class="toolbar">
        <div class="history-group">
            <button id="btn-undo" class="btn" title="Undo" disabled>↩️</button>
            <button id="btn-redo" class="btn" title="Redo" disabled>↪️</button>
        </div>

        <div class="input-group">
            <label>➕ เพิ่มไฟล์ PDF:</label>
            <input type="file" id="file-upload" accept="application/pdf" multiple style="padding: 3px;">
        </div>

        <div class="input-group">
            <label>📍 แทรกไฟล์ที่:</label>
            <select id="insert-pos"><option value="end">ต่อท้ายสุด</option></select>
        </div>

        <div class="input-group" style="border-left: 1px solid var(--border); padding-left: 10px; flex: 0 0 auto;">
            <label>สถานะการรันเลข:</label>
            <div style="display:flex; align-items:center; gap:6px; height:32px;">
                <input type="checkbox" id="master-num-toggle" checked onchange="toggleMasterNumbering()" style="width:16px; height:16px; cursor:pointer;">
                <span id="master-toggle-text" style="font-size:12px; font-weight:bold; color:var(--success);">เปิดการรันเลข</span>
            </div>
        </div>

        <div class="input-group" style="border-left: 1px solid var(--border); padding-left: 10px;">
            <label>รูปแบบตัวเลข:</label>
            <div style="display:flex; gap:4px;">
                <select id="num-type" style="width: 100px;" onchange="updateFormatOptions()">
                    <option value="arabic">อารบิก</option>
                    <option value="thai" selected>เลขไทย</option>
                    <option value="thai-alpha">ก ข ค</option>
                </select>
                <select id="num-format" style="width: 130px;" onchange="saveHistory(); if(isPreviewOpen) updatePreviewNumbers();"></select>
            </div>
        </div>

        <div class="input-group">
            <label>ฟอนต์ / ขนาด / ตำแหน่ง:</label>
            <div style="display:flex; gap:4px;">
                <select id="font-style" style="width: 90px;" onchange="saveHistory(); if(isPreviewOpen) updatePreviewNumbers();">
                    <option value="THSARABUNNEW.TTF" selected>ปกติ</option>
                    <option value="THSARABUNNEWBOLD.TTF">หนา</option>
                    <option value="THSARABUNNEWITALIC.TTF">เอียง</option>
                    <option value="THSARABUNNEWBOLDITALIC.TTF">หนาเอียง</option>
                </select>
                <input type="number" id="font-size" value="16" style="width: 60px;" oninput="saveHistory(); if(isPreviewOpen) updatePreviewNumbers();">
                <select id="num-pos" style="width: 90px;" onchange="saveHistory(); if(isPreviewOpen) updatePreviewNumbers();">
                    <option value="TR" selected>ขวาบน</option>
                    <option value="TC">กลางบน</option>
                    <option value="BR">ขวาล่าง</option>
                    <option value="BC">กลางล่าง</option>
                </select>
            </div>
        </div>

        <div class="input-group" style="max-width: 220px;">
            <label style="display: flex; align-items: center; gap: 5px;">
                ขยับตำแหน่ง 
                <span style="background: #e3f2fd; color: #0056b3; padding: 2px 6px; border-radius: 4px; font-size: 9px; cursor: help; border: 1px solid #b6d4fe;" title="เทคนิค:&#10;ใส่เลขบวก หรือ ติดลบ เพื่อกะระยะทิศทาง&#10;↔️ แนวนอน: (+ ขยับขวา, - ขยับซ้าย)&#10;↕️ แนวตั้ง: (+ ขยับขึ้น, - ขยับลง)">💡 คำแนะนำ</span>
            </label>
            <div style="display:flex; gap:6px; align-items:center;">
                <div style="display:flex; align-items:center; gap: 2px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 0 6px; height: 32px;">
                    <span style="font-size:12px; cursor: help;" title="แนวนอน (+ ขยับขวา, - ขยับซ้าย)">↔️</span>
                    <input type="number" id="offset-x" value="0" style="width: 55px; border: none; background: transparent; color: var(--text); padding: 0; text-align: center; outline: none; font-size: 13px;" oninput="if(isPreviewOpen) updatePreviewNumbers();" onchange="saveHistory();">
                </div>
                <div style="display:flex; align-items:center; gap: 2px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 0 6px; height: 32px;">
                    <span style="font-size:12px; cursor: help;" title="แนวตั้ง (+ ขยับขึ้น, - ขยับลง)">↕️</span>
                    <input type="number" id="offset-y" value="0" style="width: 55px; border: none; background: transparent; color: var(--text); padding: 0; text-align: center; outline: none; font-size: 13px;" oninput="if(isPreviewOpen) updatePreviewNumbers();" onchange="saveHistory();">
                </div>
            </div>
        </div>

        <div class="btn-group-mobile" style="display:flex; gap:6px; align-items: flex-end;">
            <button id="btn-preview-toggle" class="btn" style="background:#6c757d; color:white;">👁️ ดูเลข</button>
            <button id="btn-clear" class="btn btn-danger">🗑️ ล้างทั้งหมด</button>
            <button id="btn-export" class="btn btn-success">💾 Download PDF</button>
        </div>

        <div class="system-credit">
            ออกแบบ และพัฒนาโดย นายสุทธิชัย ชมชื่น นักวิชาการคอมพิวเตอร์ชำนาญการ กลุ่มนโยบายและแผน สำนักงานศึกษาธิการจังหวัดอุดรธานี
        </div>
    </div>

    <div id="pdf-container"></div>
</div>

<div id="zoom-modal" onclick="if(event.target === this) this.style.display='none'">
    <div id="zoom-content">
        <button class="close-modal" onclick="document.getElementById('zoom-modal').style.display='none'">X</button>
        <canvas id="zoom-canvas"></canvas>
        <div id="zoom-number-preview" class="number-preview"></div>
    </div>
</div>

<script>
    // --- ระบบ Dark Mode ---
    function toggleTheme() {
        const body = document.documentElement;
        const btn = document.getElementById('theme-btn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerText = '🌙 Dark Mode';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️ Light Mode';
            localStorage.setItem('theme', 'dark');
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('theme-btn').innerText = '☀️ Light Mode';
        }
    });

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    const container = document.getElementById('pdf-container');
    const insertPosSelect = document.getElementById('insert-pos');
    const loading = document.getElementById('loading');
    let isPreviewOpen = false;

    // --- ระบบ History (Undo/Redo) ---
    let historyStack = [];
    let redoStack = [];

    function saveHistory() {
        const state = Array.from(container.children).map(card => ({
            html: card.innerHTML,
            rotation: card.dataset.rotation,
            bytes: card._pdfBytes,
            idx: card._originalIdx,
            print: card.querySelector('.toggle-print').checked
        }));
        historyStack.push(JSON.stringify(state));
        if (historyStack.length > 30) historyStack.shift();
        redoStack = [];
        updateHistoryButtons();
    }

    function updateHistoryButtons() {
        document.getElementById('btn-undo').disabled = historyStack.length <= 1;
        document.getElementById('btn-redo').disabled = redoStack.length === 0;
    }

    document.getElementById('btn-undo').onclick = () => {
        if (historyStack.length <= 1) return;
        redoStack.push(historyStack.pop());
        restoreState(historyStack[historyStack.length - 1]);
    };

    document.getElementById('btn-redo').onclick = () => {
        if (!redoStack.length) return;
        const state = redoStack.pop();
        historyStack.push(state);
        restoreState(state);
    };

    function restoreState(json) {
        const state = JSON.parse(json);
        container.innerHTML = '';
        state.forEach(data => {
            const card = document.createElement('div');
            card.className = 'page-card';
            card.innerHTML = data.html;
            card.dataset.rotation = data.rotation;
            card._pdfBytes = data.bytes;
            card._originalIdx = data.idx;
            card.querySelector('canvas').style.transform = `rotate(${data.rotation}deg)`;
            card.querySelector('.toggle-print').checked = data.print;
            card.querySelector('.toggle-print').onchange = () => { 
                const lbl = card.querySelector('.toggle-print-label');
                lbl.classList.toggle('disabled', !card.querySelector('.toggle-print').checked);
                saveHistory(); 
                if(isPreviewOpen) updatePreviewNumbers(); 
            };
            container.appendChild(card);
        });
        updateAllBadges();
        if(isPreviewOpen) updatePreviewNumbers();
    }

    // --- ฟังก์ชันหลัก (Helper) ---
    const sortable = new Sortable(container, { 
        animation: 150,
        onEnd: () => { updateAllBadges(); saveHistory(); }
    });

    document.getElementById('file-upload').addEventListener('change', async (e) => {
        const files = e.target.files;
        if (!files.length) return;
        loading.style.display = 'flex';

        for (const file of files) {
            const bytes = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(bytes) }).promise;
            const pos = insertPosSelect.value;
            const newCards = [];

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                newCards.push(await createPageCard(page, i, bytes));
            }

            if (pos === 'end') {
                newCards.forEach(c => container.appendChild(c));
            } else {
                const target = container.children[parseInt(pos)];
                newCards.reverse().forEach(c => target.after(c));
            }
        }
        updateAllBadges();
        saveHistory();
        loading.style.display = 'none';
        e.target.value = '';
    });

    async function createPageCard(page, pageNum, pdfBytes) {
        const viewport = page.getViewport({ scale: 0.3 });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width; canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

        const card = document.createElement('div');
        card.className = 'page-card';
        card.dataset.rotation = 0;
        card._pdfBytes = pdfBytes; card._originalIdx = pageNum - 1;

        card.innerHTML = `
            <div class="page-info"></div>
            <div class="canvas-wrapper"><div class="number-preview"></div></div>
            <div class="controls">
                <label class="toggle-print-label"><input type="checkbox" class="toggle-print" checked style="margin:0;"><span>🖨️ พิมพ์เลข</span></label>
                <button type="button" onclick="rotateCard(this.closest('.page-card'))">🔄 หมุน</button>
                <button type="button" onclick="zoomCard(this.closest('.page-card'))">🔍 ขยาย</button>
                <button type="button" class="btn-critical" onclick="deleteCard(this.closest('.page-card'))">🗑️ ลบ (Undo ได้)</button>
            </div>
        `;
        
        card.querySelector('.toggle-print').addEventListener('change', (ev) => {
            const lbl = ev.target.closest('label');
            lbl.classList.toggle('disabled', !ev.target.checked);
            lbl.querySelector('span').innerText = ev.target.checked ? '🖨️ พิมพ์เลข' : '🚫 ซ่อนเลข';
            saveHistory();
            if(isPreviewOpen) updatePreviewNumbers();
        });

        card.querySelector('.canvas-wrapper').prepend(canvas);
        return card;
    }

    function rotateCard(card) {
        card.dataset.rotation = (parseInt(card.dataset.rotation) + 90) % 360;
        card.querySelector('canvas').style.transform = `rotate(${card.dataset.rotation}deg)`;
        saveHistory();
        if(isPreviewOpen) updatePreviewNumbers();
    }

    function deleteCard(card) {
        card.remove();
        updateAllBadges();
        saveHistory();
    }

    document.getElementById('btn-clear').onclick = () => {
        if(confirm('ต้องการล้างหน้าเอกสารทั้งหมดใช่ไหมคะ?')) {
            container.innerHTML = '';
            updateAllBadges();
            saveHistory();
        }
    };

    function updateAllBadges() {
        const cards = container.children;
        insertPosSelect.innerHTML = '<option value="end">ต่อท้ายสุด</option>';
        for (let i = 0; i < cards.length; i++) {
            cards[i].querySelector('.page-info').innerText = `ลำดับ: ${i + 1}`;
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = `แทรกหลังหน้าที่ ${i + 1}`;
            insertPosSelect.appendChild(opt);
        }
        if(isPreviewOpen) updatePreviewNumbers();
    }

    // --- ส่วนแสดงผลตัวเลข (Preview) ---
    document.getElementById('btn-preview-toggle').onclick = function() {
        isPreviewOpen = !isPreviewOpen;
        this.innerText = isPreviewOpen ? '❌ ปิดพรีวิว' : '👁️ ดูเลข';
        this.style.background = isPreviewOpen ? '#dc3545' : '#6c757d';
        updatePreviewNumbers();
    };

    function toggleMasterNumbering() {
        const isEnabled = document.getElementById('master-num-toggle').checked;
        const textLabel = document.getElementById('master-toggle-text');
        
        if (isEnabled) {
            textLabel.innerText = 'เปิดการรันเลข';
            textLabel.style.color = 'var(--success)';
        } else {
            textLabel.innerText = 'ปิดรันเลข (ต่อไฟล์เฉยๆ)';
            textLabel.style.color = 'var(--danger)';
        }

        if(isPreviewOpen) updatePreviewNumbers();
        saveHistory();
    }

    function updatePreviewNumbers() {
        const isMasterEnabled = document.getElementById('master-num-toggle').checked;
        const type = document.getElementById('num-type').value;
        const format = document.getElementById('num-format').value || '{n}';
        const posType = document.getElementById('num-pos').value;
        
        const fontStyleFile = document.getElementById('font-style').value;
        const isBold = fontStyleFile.includes('BOLD');
        const isItalic = fontStyleFile.includes('ITALIC');
        
        const ox = (parseInt(document.getElementById('offset-x').value) || 0) * 0.3;
        const oy = (parseInt(document.getElementById('offset-y').value) || 0) * 0.3;
        const totalPages = container.children.length;

        Array.from(container.children).forEach((card, i) => {
            const preview = card.querySelector('.number-preview');
            const isPrint = card.querySelector('.toggle-print').checked;
            
            if (!isPreviewOpen || !isPrint || !isMasterEnabled) { 
                preview.style.display = 'none'; 
                return; 
            }

            preview.style.display = 'block';
            preview.innerText = getFormattedNumberText(i + 1, totalPages, type, format);
            
            preview.style.fontWeight = isBold ? 'bold' : 'normal';
            preview.style.fontStyle = isItalic ? 'italic' : 'normal';

            preview.style.top = 'auto'; preview.style.bottom = 'auto'; preview.style.left = 'auto'; preview.style.right = 'auto'; preview.style.transform = 'none';

            if(posType === 'TR') { preview.style.top = (10 - oy)+'px'; preview.style.right = (10 - ox)+'px'; }
            else if(posType === 'TC') { preview.style.top = (10 - oy)+'px'; preview.style.left = '50%'; preview.style.transform = `translateX(calc(-50% + ${ox}px))`; }
            else if(posType === 'BR') { preview.style.bottom = (10 + oy)+'px'; preview.style.right = (10 - ox)+'px'; }
            else if(posType === 'BC') { preview.style.bottom = (10 + oy)+'px'; preview.style.left = '50%'; preview.style.transform = `translateX(calc(-50% + ${ox}px))`; }
        });
    }

    function getFormattedNumberText(num, total, type, format) {
        let str = num.toString();
        let strTotal = total.toString();
        
        if (type === 'thai') {
            str = num.toString().replace(/\d/g, d => '๐๑๒๓๔๕๖๗๘๙'[d]);
            strTotal = total.toString().replace(/\d/g, d => '๐๑๒๓๔๕๖๗๘๙'[d]);
        }
        else if (type === 'thai-alpha') {
            str = "กขคฆงจฉชซฌญฎฏฐฑฒณดตถทธนบปผฝพฟภมยรลวศษสฬอฮ"[(num-1)%42];
            strTotal = "กขคฆงจฉชซฌญฎฏฐฑฒณดตถทธนบปผฝพฟภมยรลวศษสฬอฮ"[(total-1)%42];
        }
        
        return format.replace('{n}', str).replace('{total}', strTotal);
    }

    // --- ดาวน์โหลด Helper (ระบบโหลด Font อัตโนมัติแบบประหยัด) ---
    document.getElementById('btn-export').onclick = async () => {
        if (!container.children.length) return alert('กรุณาเลือกไฟล์ PDF ก่อนค่ะ!');
        loading.style.display = 'flex';
        try {
            const { PDFDocument, degrees } = PDFLib;
            const finalPdf = await PDFDocument.create();
            
            const isMasterEnabled = document.getElementById('master-num-toggle').checked;
            const needsFont = isMasterEnabled && Array.from(container.children).some(card => card.querySelector('.toggle-print').checked);
            
            let font = null;
            if (needsFont) {
                finalPdf.registerFontkit(fontkit);
                const fontFileName = document.getElementById('font-style').value;
                const fontBytes = await fetch('fonts/' + fontFileName).then(res => res.arrayBuffer());
                font = await finalPdf.embedFont(fontBytes);
            }

            const type = document.getElementById('num-type').value;
            const format = document.getElementById('num-format').value;
            const posType = document.getElementById('num-pos').value;
            const fSize = parseInt(document.getElementById('font-size').value);
            
            const ox = parseInt(document.getElementById('offset-x').value) || 0;
            const oy = parseInt(document.getElementById('offset-y').value) || 0;
            const totalPages = container.children.length; 

            for (let i = 0; i < container.children.length; i++) {
                const card = container.children[i];
                const src = await PDFDocument.load(card._pdfBytes);
                const [page] = await finalPdf.copyPages(src, [card._originalIdx]);
                
                const rot = parseInt(card.dataset.rotation);
                const totalRot = (page.getRotation().angle + rot) % 360;
                page.setRotation(degrees(totalRot));

                if (isMasterEnabled && card.querySelector('.toggle-print').checked && font) {
                    const { width, height } = page.getSize();
                    const text = getFormattedNumberText(i+1, totalPages, type, format); 
                    const tw = font.widthOfTextAtSize(text, fSize);
                    let tx, ty, margin = 40;

                    const vW = (totalRot === 90 || totalRot === 270) ? height : width;
                    const vH = (totalRot === 90 || totalRot === 270) ? width : height;

                    if(posType === 'TR') { tx = vW - tw - margin + ox; ty = vH - margin - fSize + oy; }
                    else if(posType === 'TC') { tx = (vW - tw)/2 + ox; ty = vH - margin - fSize + oy; }
                    else if(posType === 'BR') { tx = vW - tw - margin + ox; ty = margin + oy; }
                    else if(posType === 'BC') { tx = (vW - tw)/2 + ox; ty = margin + oy; }

                    let fx = tx, fy = ty;
                    if(totalRot === 90) { fx = width - ty - fSize; fy = tx; }
                    else if(totalRot === 180) { fx = width - tx - tw; fy = height - ty - fSize; }
                    else if(totalRot === 270) { fx = ty; fy = height - tx - tw; }
                    page.drawText(text, { x: fx, y: fy, size: fSize, font, rotate: degrees(totalRot) });
                }
                finalPdf.addPage(page);
            }
            const blob = new Blob([await finalPdf.save()], {type:'application/pdf'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `PEO_PDF_${Date.now()}.pdf`;
            a.click();
        } catch(e) { 
            console.error(e); 
            const fontFileName = document.getElementById('font-style').value;
            alert(`เกิดข้อผิดพลาดค่ะ! ตรวจสอบว่ามีไฟล์ fonts/${fontFileName} อยู่บนโฮสต์หรือไม่`); 
        }
        loading.style.display = 'none';
    };

    // ฟังก์ชันสร้างตัวเลือก Format และล็อคให้ {n} (เฉพาะตัวเลข) เป็นค่าพื้นฐาน
    function updateFormatOptions() {
        const type = document.getElementById('num-type').value;
        const fmt = document.getElementById('num-format');
        const currentValue = fmt.value;
        
        const p = (type === 'thai') ? '๑' : (type === 'thai-alpha' ? 'ก' : '1');
        const t = (type === 'thai') ? '๙' : (type === 'thai-alpha' ? 'ฮ' : '9'); 
        
        fmt.innerHTML = `
            <option value="- {n} -">- ${p} -</option>
            <option value="หน้า {n}">หน้า ${p}</option>
            <option value="หน้า {n} / {total}">หน้า ${p} / ${t}</option>
            <option value="({n})">(${p})</option>
            <option value="{n}">${p}</option>
        `;
        
        // เช็คว่ามีค่าเก่าอยู่ไหม ถ้าไม่มี(โหลดหน้าแรก) ให้ตั้งค่าเป็น {n} อย่างเดียว
        if (currentValue && Array.from(fmt.options).some(opt => opt.value === currentValue)) {
            fmt.value = currentValue;
        } else {
            fmt.value = '{n}';
        }

        if(isPreviewOpen) updatePreviewNumbers();
    }

    async function zoomCard(card) {
        loading.style.display = 'flex';
        const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(card._pdfBytes) }).promise;
        const page = await pdf.getPage(card._originalIdx + 1);
        
        const viewport = page.getViewport({ scale: 1.5 });
        const zCanvas = document.getElementById('zoom-canvas');
        zCanvas.width = viewport.width; zCanvas.height = viewport.height;
        await page.render({ canvasContext: zCanvas.getContext('2d'), viewport }).promise;

        const zoomPreview = document.getElementById('zoom-number-preview');
        const isMasterEnabled = document.getElementById('master-num-toggle').checked;
        const isPrint = card.querySelector('.toggle-print').checked;

        if (!isPreviewOpen || !isPrint || !isMasterEnabled) {
            zoomPreview.style.display = 'none';
        } else {
            const type = document.getElementById('num-type').value;
            const format = document.getElementById('num-format').value || '{n}';
            const posType = document.getElementById('num-pos').value;
            
            const fontStyleFile = document.getElementById('font-style').value;
            const isBold = fontStyleFile.includes('BOLD');
            const isItalic = fontStyleFile.includes('ITALIC');
            
            const valX = parseInt(document.getElementById('offset-x').value) || 0;
            const valY = parseInt(document.getElementById('offset-y').value) || 0;
            const baseFontSize = parseInt(document.getElementById('font-size').value) || 16;
            
            const ox = valX * 1.5;
            const oy = valY * 1.5;
            const paddingEdge = 60; 

            const totalPages = container.children.length;
            const pageIndex = Array.from(container.children).indexOf(card) + 1;

            zoomPreview.innerText = getFormattedNumberText(pageIndex, totalPages, type, format);
            zoomPreview.style.fontWeight = isBold ? 'bold' : 'normal';
            zoomPreview.style.fontStyle = isItalic ? 'italic' : 'normal';
            zoomPreview.style.fontSize = (baseFontSize * 1.5) + 'px'; 

            zoomPreview.style.top = 'auto'; zoomPreview.style.bottom = 'auto'; zoomPreview.style.left = 'auto'; zoomPreview.style.right = 'auto'; zoomPreview.style.transform = 'none';

            if(posType === 'TR') { zoomPreview.style.top = (paddingEdge - oy)+'px'; zoomPreview.style.right = (paddingEdge - ox)+'px'; }
            else if(posType === 'TC') { zoomPreview.style.top = (paddingEdge - oy)+'px'; zoomPreview.style.left = '50%'; zoomPreview.style.transform = `translateX(calc(-50% + ${ox}px))`; }
            else if(posType === 'BR') { zoomPreview.style.bottom = (paddingEdge + oy)+'px'; zoomPreview.style.right = (paddingEdge - ox)+'px'; }
            else if(posType === 'BC') { zoomPreview.style.bottom = (paddingEdge + oy)+'px'; zoomPreview.style.left = '50%'; zoomPreview.style.transform = `translateX(calc(-50% + ${ox}px))`; }

            zoomPreview.style.display = 'block';
        }

        loading.style.display = 'none';
        document.getElementById('zoom-modal').style.display = 'flex';
    }

    // เรียกตอนโหลดหน้าจอให้มัน Set Default ให้เรียบร้อย
    window.onload = () => { updateFormatOptions(); saveHistory(); };
</script>
